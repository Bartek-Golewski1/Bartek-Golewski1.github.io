{% extends 'layout.html' %}
{% block content %}
    <div class="card" style="border-left-color: #2ecc71;">
        <h2 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">{{ song.title }}</h2>
        <p><strong>Wykonawca:</strong> {{ song.artist }}</p>
        <p><strong>Twoja opinia:</strong></p>
        <blockquote style="background: #f8f9fa; padding: 1rem; border-left: 3px solid #3498db; margin: 0; font-style: italic;">
            {{ song.opinion }}
        </blockquote>

        <div class="actions" style="margin-top: 2rem;">
            <a href="{{ url_for('index') }}" class="btn" style="background-color: #95a5a6;">&larr; Powrót do listy</a>
            <a href="{{ url_for('edit', id=song.id) }}" class="btn btn-edit">Edytuj ten utwór</a>
        </div>
    </div>
{% endblock %}
